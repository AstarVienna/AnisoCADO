name: Check Markdown links

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

  # Run every Monday at 5:00 UTC
  schedule:
    - cron: "0 5 * * MON"

jobs:
